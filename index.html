<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skull Creek - 3D TPS Battle Royale Prototype</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="game-shell">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="panel top-left">
        <div class="title">SKULL CREEK</div>
        <div class="subtitle">3D TPS Battle Royale Prototype</div>
      </div>

      <div class="panel top-center">
        <div class="stat-label">생존 인원</div>
        <div class="stat-value" id="survivors">10</div>
      </div>

      <div class="panel top-right is-hidden-panel" id="zone-panel">
        <div class="stat-label">자기장</div>
        <div class="stat-value" id="zone-state">대기 중</div>
        <div class="zone-timer" id="zone-timer">00:30</div>
      </div>

      <div class="panel bottom-left">
        <div class="stat-label" id="char-name">Red</div>
        <div class="health-bar">
          <div class="health-fill" id="health-fill"></div>
        </div>
        <div class="stat-row">
          <span id="health-text">10000 / 10000</span>
          <span id="reload-state">준비 완료</span>
        </div>
      </div>

      <div class="panel bottom-right">
        <div class="ammo-wrap">
          <div class="stat-label">탄약</div>
          <div class="ammo-pips" id="ammo-pips"></div>
        </div>
        <div class="stat-row">
          <span id="attack-state">더블 펀치</span>
          <span id="spread-state">안정성 100%</span>
        </div>
      </div>

      <div id="crosshair">
        <div class="crosshair-line horizontal"></div>
        <div class="crosshair-line vertical"></div>
        <div class="hit-marker" id="hit-marker"></div>
      </div>

      <div id="mobile-joystick" aria-hidden="true">
        <div id="mobile-joystick-base">
          <div id="mobile-joystick-thumb"></div>
        </div>
      </div>

      <button id="mobile-attack-button" type="button" aria-label="공격">공격</button>

      <div id="warning" class="hidden">자기장 밖입니다</div>
      <div id="kill-feed"></div>

      <div id="message-overlay">
        <div class="message-card">
          <h1>해골천</h1>
          <p>WASD 이동 · 마우스로 조준 · 클릭으로 공격 · R 장전</p>
          <p class="char-select-label">캐릭터를 선택하세요</p>
          <div class="char-select-row">
            <button id="select-red" class="char-btn" type="button">
              <div class="char-icon char-icon-red">R</div>
              <div class="char-name">Red</div>
              <div class="char-stats">HP 10,000</div>
              <div class="char-desc">더블 펀치 · 사거리 4타일</div>
            </button>
            <button id="select-green" class="char-btn" type="button">
              <div class="char-icon char-icon-green">G</div>
              <div class="char-name">Green</div>
              <div class="char-stats">HP 8,400</div>
              <div class="char-desc">부메랑 4연발 · 사거리 5타일</div>
            </button>
          </div>
        </div>
      </div>

      <div id="result-overlay" class="hidden">
        <div class="message-card">
          <h2 id="result-title">전투 종료</h2>
          <p id="result-body"></p>
          <button id="restart-button" type="button">다시 시작</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
