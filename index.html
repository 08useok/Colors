<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skull Creek - 3D TPS Battle Royale Prototype</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="game-shell">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="panel top-left">
        <div class="title">SKULL CREEK</div>
        <div class="subtitle">3D TPS Battle Royale Prototype</div>
      </div>

      <div class="panel top-center">
        <div class="stat-label">생존 인원</div>
        <div class="stat-value" id="survivors">10</div>
      </div>

      <div class="panel top-right is-hidden-panel" id="zone-panel">
        <div class="stat-label">자기장</div>
        <div class="stat-value" id="zone-state">대기 중</div>
        <div class="zone-timer" id="zone-timer">00:30</div>
      </div>

      <div class="panel bottom-left">
        <div class="stat-label" id="char-name">Red</div>
        <div class="health-bar">
          <div class="health-fill" id="health-fill"></div>
        </div>
        <div class="stat-row">
          <span id="health-text">10000 / 10000</span>
          <span id="reload-state">준비 완료</span>
        </div>
      </div>

      <div class="panel bottom-right">
        <div class="ammo-wrap">
          <div class="stat-label">탄약</div>
          <div class="ammo-pips" id="ammo-pips"></div>
        </div>
        <div class="stat-row">
          <span id="attack-state">더블 펀치</span>
          <span id="spread-state">안정성 100%</span>
        </div>
      </div>

      <div id="crosshair">
        <div class="crosshair-line horizontal"></div>
        <div class="crosshair-line vertical"></div>
        <div class="hit-marker" id="hit-marker"></div>
      </div>

      <div id="mobile-joystick" aria-hidden="true">
        <div id="mobile-joystick-base">
          <div id="mobile-joystick-thumb"></div>
        </div>
      </div>

      <button id="mobile-attack-button" type="button" aria-label="공격">공격</button>

      <div id="warning" class="hidden">자기장 밖입니다</div>
      <div id="kill-feed"></div>

      <!-- 로비 오버레이 -->
      <div id="message-overlay">

        <!-- 계정 생성 (최초 1회) -->
        <div id="account-creation" class="message-card">
          <h1>해골천</h1>
          <p class="lobby-intro">배틀로얄 전장에 오신 것을 환영합니다</p>
          <p class="char-select-label">아이디</p>
          <input id="id-input" class="lobby-input" type="text" maxlength="16" placeholder="최대 16자" autocomplete="off">
          <p class="char-select-label">닉네임</p>
          <input id="nickname-input" class="lobby-input" type="text" maxlength="12" placeholder="최대 12자" autocomplete="off">
          <button id="create-account-btn" class="lobby-start-btn" type="button" disabled>전장 입장</button>
        </div>

        <!-- 일일 아이디 인증 -->
        <div id="daily-login" class="message-card hidden">
          <div class="lobby-header">
            <div class="lobby-left">
              <div class="lobby-nickname" id="daily-login-nickname">플레이어</div>
              <div class="lobby-level" id="daily-login-level">Lv.1</div>
            </div>
          </div>
          <p class="lobby-intro">오늘의 아이디를 입력하세요</p>
          <input id="daily-id-input" class="lobby-input" type="text" maxlength="16" placeholder="아이디 입력" autocomplete="off">
          <div id="daily-login-error" class="daily-error hidden"></div>
          <button id="daily-login-btn" class="lobby-start-btn" type="button">확인</button>
          <button id="account-recovery-btn" class="lobby-start-btn lobby-recovery-btn hidden" type="button">계정 문제 해결하기</button>
          <div id="account-recovery-info" class="daily-recovery-info hidden"></div>
        </div>

        <!-- 로비 메인 -->
        <div id="lobby-main" class="message-card hidden">
          <div class="lobby-header">
            <div class="lobby-left">
              <div class="lobby-nickname" id="lobby-nickname">플레이어</div>
              <div class="lobby-level" id="lobby-level">Lv.1</div>
            </div>
            <div class="lobby-right">
              <div class="lobby-trophy">🏆 <span id="lobby-trophies">0</span></div>
              <div class="lobby-record" id="lobby-record">0승 0패</div>
            </div>
          </div>

          <div class="lobby-divider"></div>

          <p class="char-select-label">캐릭터 선택</p>
          <div class="char-select-row">
            <button id="select-red" class="char-btn" type="button" data-char="red">
              <div class="char-icon char-icon-red">R</div>
              <div class="char-name">Red</div>
              <div class="char-stats">HP 10,000</div>
              <div class="char-desc">더블 펀치 · 사거리 4타일</div>
            </button>
            <button id="select-green" class="char-btn" type="button" data-char="green">
              <div class="char-icon char-icon-green">G</div>
              <div class="char-name">Green</div>
              <div class="char-stats">HP 8,400</div>
              <div class="char-desc">부메랑 60° 4연발 · 사거리 5타일</div>
            </button>
          </div>

          <p class="lobby-controls">WASD 이동 · 마우스 조준 · 클릭 공격 · R 장전</p>
          <button id="start-battle-btn" class="lobby-start-btn" type="button">전투 시작</button>
        </div>

      </div>

      <div id="result-overlay" style="display:none">
        <div class="message-card">
          <h2 id="result-title">전투 종료</h2>
          <p id="result-body"></p>
          <button id="restart-button" type="button">다시 시작</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
