<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colors - Beta Season Test</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./beta-season.css?v=0.1.0">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="beta-canvas"></canvas>

  <header class="beta-header">
    <div>
      <span class="test-chip">TEST ONLY</span>
      <h1>베타 시즌 1</h1>
      <p>부유 유적 섬 · 맵 동선 테스트</p>
    </div>
    <nav class="beta-nav">
      <button type="button" data-panel="characters">캐릭터</button>
      <button type="button" data-panel="shop">시즌 상점</button>
      <button type="button" data-panel="daily">일일 보상</button>
      <a href="./index.html">현재 게임</a>
    </nav>
  </header>

  <div class="beta-wallet">
    <span>β 크레딧</span>
    <strong id="credit-value">1,500</strong>
    <span class="rank-chip">시즌 테스트 1위</span>
  </div>

  <aside class="test-panel">
    <strong>맵 테스트</strong>
    <p><kbd>WASD</kbd> 이동 · 마우스 드래그 시점 · 휠 확대</p>
    <div class="test-actions">
      <button id="overview-btn" type="button">전체 보기</button>
      <button id="reset-btn" type="button">시작점 복귀</button>
    </div>
    <small>이 페이지의 플레이는 계정, 전적, 이벤트에 저장되지 않습니다.</small>
  </aside>

  <div class="location-card">
    <span>현재 구역</span>
    <strong id="location-name">베타 광장</strong>
  </div>

  <div class="beta-watermark">BETA MAP 0.1</div>

  <button id="ultimate-btn" class="ultimate-btn" type="button">
    <small>1위 궁극기</small>
    <strong>시즌 브레이크</strong>
    <span id="ultimate-state">사용 가능</span>
  </button>

  <div id="beta-modal" class="beta-modal hidden" role="dialog" aria-modal="true">
    <section class="beta-modal-card">
      <div class="modal-title-row">
        <div>
          <span class="test-chip">BETA SYSTEM</span>
          <h2 id="modal-title">베타 시즌</h2>
        </div>
        <button id="modal-close" class="modal-close" type="button" aria-label="닫기">×</button>
      </div>
      <div id="modal-content"></div>
    </section>
  </div>

  <div id="beta-toast" class="beta-toast" aria-live="polite"></div>
  <script type="module" src="./src/beta-season.js?v=0.1.0"></script>
</body>
</html>
